version: "2"

run:
  build-tags:
    - integration

linters:
  default: none
  enable:
    - depguard
    - errcheck
    - govet
    - gosec
    - sqlclosecheck
    - staticcheck
  settings:
    depguard:
      rules:
        # ADR-0014: domain packages are pure — stdlib only, no IO, no third-party.
        domain-pure:
          files:
            - "**/internal/domain/**"
          allow:
            - $gostd
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
