version: "2"
overrides:
  go: &overrides
    overrides:
      - db_type: "uuid"
        go_type: "string"
      - db_type: "uuid"
        nullable: true
        go_type:
          type: "string"
          pointer: true
      - db_type: "timestamptz"
        go_type:
          import: "time"
          type: "Time"
      - db_type: "timestamptz"
        nullable: true
        go_type:
          import: "time"
          type: "Time"
          pointer: true
sql:
  - engine: postgresql
    schema: services/identity/migrations
    queries: services/identity/internal/adapters/postgres/queries.sql
    gen:
      go:
        <<: *overrides
        package: db
        out: services/identity/internal/adapters/postgres/db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
  - engine: postgresql
    schema: services/account/migrations
    queries: services/account/internal/adapters/postgres/queries.sql
    gen:
      go:
        <<: *overrides
        package: db
        out: services/account/internal/adapters/postgres/db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
  - engine: postgresql
    schema: services/ledger/migrations
    queries: services/ledger/internal/adapters/postgres/queries.sql
    gen:
      go:
        <<: *overrides
        package: db
        out: services/ledger/internal/adapters/postgres/db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
  - engine: postgresql
    schema: services/transfer/migrations
    queries: services/transfer/internal/adapters/postgres/queries.sql
    gen:
      go:
        <<: *overrides
        package: db
        out: services/transfer/internal/adapters/postgres/db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
