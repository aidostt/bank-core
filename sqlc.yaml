version: "2"
sql:
  - engine: postgresql
    schema: services/identity/migrations
    queries: services/identity/internal/adapters/postgres/queries.sql
    gen:
      go:
        package: db
        out: services/identity/internal/adapters/postgres/db
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "uuid"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
