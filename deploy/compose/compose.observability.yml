# Observability profile (ADR-0013): make up-observability layers this file
# over docker-compose.yml. Core services already point OTLP at jaeger:4317 —
# without this profile the exporter fails quietly.
name: bank-core

services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    profiles: [obs]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [obs]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    profiles: [obs]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_RENDERING_SERVER_URL: http://grafana-renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

  grafana-renderer:
    image: grafana/grafana-image-renderer:3.11.1
    profiles: [obs]
    restart: unless-stopped
