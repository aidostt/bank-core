global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    static_configs: [{ targets: ["gateway:8080"] }]
  - job_name: identity
    static_configs: [{ targets: ["identity:8081"] }]
  - job_name: account
    static_configs: [{ targets: ["account:8082"] }]
  - job_name: ledger
    static_configs: [{ targets: ["ledger:8083"] }]
  - job_name: transfer
    static_configs: [{ targets: ["transfer:8084"] }]
  - job_name: antifraud
    static_configs: [{ targets: ["antifraud:8085"] }]
  - job_name: notification
    static_configs: [{ targets: ["notification:8086"] }]
