name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.x"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'pkg/**'
              - 'gen/**'
              - 'services/**'
              - 'proto/**'
              - 'tests/**'
              - 'go.work*'
              - 'sqlc.yaml'
              - '.golangci.yml'
              - 'deploy/**'
              - 'Makefile'
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: bufbuild/buf-setup-action@v1
      - name: buf lint
        run: buf lint
      - name: buf breaking (PRs against main)
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=origin/main,subdir=proto"
        continue-on-error: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
          args: --build-tags "integration,e2e" ./...
          working-directory: pkg
      - name: golangci-lint remaining modules
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.0
          for m in gen/go services/gateway services/identity services/account \
                   services/ledger services/transfer services/antifraud \
                   services/notification tests/e2e; do
            echo "--- $m"
            (cd "$m" && golangci-lint run --build-tags "integration,e2e" ./...)
          done

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: unit tests
        run: make test

  integration:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: integration tests (testcontainers)
        run: make test-integration

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, identity, account, ledger, transfer, antifraud, notification]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/compose/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  e2e:
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: start stack
        run: docker compose -f deploy/compose/docker-compose.yml --profile core up -d --build
      - name: e2e
        run: make e2e
      - name: stack logs on failure
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs --tail 100
      - name: stop stack
        if: always()
        run: docker compose -f deploy/compose/docker-compose.yml --profile core down -v
